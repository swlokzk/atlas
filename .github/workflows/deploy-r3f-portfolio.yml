name: Build and Deploy r3f-portfolio

on:
  push:
    branches: [ main ]
    paths:
      - '_development/r3f-portfolio/**'

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'        # optional: cache for npm; we will also cache pnpm store below

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('_development/r3f-portfolio/**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install pnpm and dependencies
        working-directory: _development/r3f-portfolio
        run: |
          npm install -g pnpm@8
          pnpm install --frozen-lockfile

      - name: Build r3f
        working-directory: _development/r3f-portfolio
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: r3f-portfolio
          directory: _development/r3f-portfolio/dist