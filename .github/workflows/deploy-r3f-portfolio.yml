name: Build and Deploy r3f-portfolio

on:
  push:
    branches: [ main ]
    paths:
      - '_development/r3f-portfolio/**'

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # 預設為 fetch-depth: 1 (Shallow Clone)，節省拉取資源

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Use Node.js 20 with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: _development/r3f-portfolio/pnpm-lock.yaml
      
      - name: Install dependencies
        working-directory: _development/r3f-portfolio
        run: pnpm install --frozen-lockfile

      - name: Build r3f
        working-directory: _development/r3f-portfolio
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: r3f-portfolio
          # 指向 GitHub 運行器上已經打包好的 dist 目錄
          directory: _development/r3f-portfolio/dist
