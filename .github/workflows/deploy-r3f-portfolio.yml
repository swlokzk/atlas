name: Build and Deploy r3f-portfolio

on:
  push:
    branches: [ main ]
    paths:
      - '_development/r3f-portfolio/**'
  workflow_dispatch: # 保留手動觸發功能，方便測試

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1. 升級至 Node.js 24 避免 Actions 環境棄用警告
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 2. 核心修正：升級至 pnpm@9 以匹配你本地生成的 lockfile 結構
      - name: Install pnpm
        run: npm install -g pnpm@9

      # 使用 GitHub 官方允許的 actions/cache 手動處理快取
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('_development/r3f-portfolio/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 執行安裝（現在有了 package.json 中的 onlyBuiltDependencies，sharp 也能在雲端安全順利編譯）
      - name: Install dependencies
        working-directory: _development/r3f-portfolio
        run: pnpm install --frozen-lockfile

      # 執行組建
      - name: Build r3f
        working-directory: _development/r3f-portfolio
        run: pnpm run build

      # 使用官方統一的 Wrangler Action 部署至 Cloudflare
      - name: Deploy to Cloudflare Pages via Wrangler Action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _development/r3f-portfolio/dist --project-name=r3f-portfolio
