name: Build and Deploy r3f-portfolio

on:
  push:
    branches: [ main ]
    paths:
      - '_development/r3f-portfolio/**'
  workflow_dispatch: # 順便保留手動觸發功能，方便測試

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 使用 GitHub 官方允許的 setup-node
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 替代方案：直接用 npm 全局安裝 pnpm，不走第三方的 action
      - name: Install pnpm
        run: npm install -g pnpm@8

      # 使用 GitHub 官方允許的 actions/cache 手動處理快取
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('_development/r3f-portfolio/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 執行安裝
      - name: Install dependencies
        working-directory: _development/r3f-portfolio
        run: pnpm install --frozen-lockfile

      # 執行組建
      - name: Build r3f
        working-directory: _development/r3f-portfolio
        run: pnpm run build

      # 使用官方統一的 Wrangler Action
      - name: Deploy to Cloudflare Pages via Wrangler Action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 核心差異：直接呼叫 Wrangler 原生的 pages deploy 命令
          command: pages deploy _development/r3f-portfolio/dist --project-name=r3f-portfolio
